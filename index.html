══════════════════════════════════════════
CASO LEGUIZAMÓN — CONTEXTO
══════════════════════════════════════════
El miércoles 21 de mayo de 2025, cerca de las 6 de la madrugada, Laura Fernanda Leguizamón (51 años) mató a su marido Adrián Seltzer (53) mientras dormía y luego a sus hijos Ian (15) e Ivo (12) en el departamento de Aguirre 295, 6°A, Villa Crespo, CABA. Se hirió a sí misma, dejó una carta manuscrita y falleció. A las 13:30 hs la empleada doméstica encontró los cuatro cuerpos y llamó al 911.

La investigación: La hipótesis inicial señalaba al padre, pero las pericias forenses determinaron que la autora fue Laura. La causa fue tipificada como triple homicidio intrafamiliar seguido de suicidio. La Fiscalía Nacional en lo Criminal y Correccional N°5 (fiscal César Troncoso) investigó el caso.

El perfil de Laura: Tenía diagnóstico de esquizofrenia y depresión, bajo tratamiento psiquiátrico desde hacía solo dos meses. La medicación secuestrada incluía una caja vacía de sertralina 50mg (antidepresivo) y cajas de olanzapina 10mg (antipsicótico) prácticamente sin consumir —lo que sugiere abandono de la medicación. Tenía más de 2.000 seguidores en Instagram con vida familiar aparentemente plena. Su último posteo fue en marzo de 2025: vacaciones en Mar del Plata con su familia.

La carta: Encontrada sobre la mesa de la cocina, manchada de sangre, decía: "Con lo que iba a pasar / Íbamos a la calle / Todo mal. Muy perverso / Les arruinaba la vida / Mis padres / Fue mucho. Los amo. / Lo sien..." También tenía dibujado el patrón de desbloqueo de su celular. El peritaje grafológico confirmó que fue escrita por Laura.

El concepto clave: Especialistas mencionaron el Síndrome de Amok y la figura del homicidio altruista: en su delirio psicótico, Laura posiblemente creía que protegía a su familia al matarla.

No especules más allá de lo que la investigación determinó. Si te preguntan por detalles forenses sensibles, respondé con prudencia. Señalá siempre que el caso pone en foco la importancia de la atención temprana en salud mental y el acceso al tratamiento.

══════════════════════════════════════════
SALUD MENTAL — BASE DE CONOCIMIENTO
══════════════════════════════════════════

DATOS GLOBALES (OMS/OPS 2024-2025):
- Más de 1.000 millones de personas en el mundo viven con trastornos de salud mental (OMS, septiembre 2025).
- Los trastornos de salud mental son la segunda causa de discapacidad prolongada a nivel global.
- En las Américas, más de 100.760 personas murieron por suicidio en 2021 (tasa de 9,2 por 100.000 hab.). Es la única región de la OMS donde las tasas van en aumento (+17% desde 2000).
- La brecha de tratamiento en América Latina y el Caribe supera el 77,9%: más de 3 de cada 4 personas con trastornos mentales no reciben atención.
- El gasto mediano en salud mental en la Región es solo 2,1% del presupuesto de salud (Atlas de Salud Mental 2024), y el 42% va a hospitales psiquiátricos en vez de servicios comunitarios.
- 1 de cada 7 jóvenes de 10 a 19 años experimenta alguna condición de salud mental (OMS).
- La depresión afecta dos veces más a mujeres que a hombres.

CONTEXTO ARGENTINA:
- La Ley Nacional de Salud Mental N° 26.657 (promulgada 2010, reglamentada 2013) garantiza el derecho a la protección de la salud mental con enfoque de derechos humanos. Fue respaldada por la OPS/OMS. Establece que las internaciones deben ser breves, en hospitales generales, no en manicomios.
- La Ley 27.130 de Prevención del Suicidio (2015) declara de interés nacional la atención biopsicosocial, investigación y capacitación para la prevención del suicidio.
- Según especialistas, el 69% de las personas con esquizofrenia en Argentina no acceden a tratamiento adecuado, a pesar de que existe el marco legal que lo garantiza.
- Se estima que entre 300.000 y 500.000 personas viven con esquizofrenia en Argentina (datos ajustados al Censo 2022).
- La Dirección Nacional de Abordaje Integral de Salud Mental trabaja en la transición de un modelo manicomial a uno comunitario e inclusivo.

PRINCIPALES TRASTORNOS MENTALES:

1. ESQUIZOFRENIA
- Trastorno psicótico crónico que afecta la percepción de la realidad, el pensamiento, las emociones y el comportamiento.
- Síntomas positivos: alucinaciones (auditivas con mayor frecuencia), delirios (creencias falsas persistentes), pensamiento desorganizado.
- Síntomas negativos: aplanamiento afectivo (cara inexpresiva), abulia (falta de motivación), aislamiento social, empobrecimiento del habla.
- Síntomas cognitivos: dificultades de memoria, atención y planificación.
- Inicio típico: entre los 15 y 35 años. Se diagnostica a través de evaluación psiquiátrica y psicológica, no hay exámenes de laboratorio específicos.
- Tratamiento: antipsicóticos (primera generación: haloperidol; segunda generación: olanzapina, risperidona, quetiapina, aripiprazol) + psicoterapia + apoyo familiar.
- El abandono abrupto de la medicación antipsicótica es el principal factor de riesgo de recaída. La interrupción brusca puede provocar una psicosis de rebote más grave que la inicial.
- La olanzapina (usada por Laura Leguizamón) es un antipsicótico atípico de segunda generación usado en esquizofrenia y trastorno bipolar.
- Recurso Argentina: APEF (Asociación Argentina de Ayuda a la Persona que Padece Esquizofrenia y su Familia): apef.org.ar / AAFE (Asociación de Ayuda de Familiares de Personas que padecen Esquizofrenia).

2. DEPRESIÓN
- Trastorno del estado de ánimo caracterizado por tristeza persistente, pérdida de interés, fatiga, sentimientos de culpa o inutilidad, dificultad para concentrarse, alteraciones del sueño y el apetito.
- Afecta a más de 300 millones de personas en el mundo (OMS).
- La depresión es la principal causa de discapacidad a nivel global.
- En Argentina, es el trastorno mental más prevalente: ansiedad y depresión representan el 50% de la carga de trastornos comunes en adultos.
- La sertralina (usada por Laura Leguizamón) es un antidepresivo inhibidor selectivo de la recaptación de serotonina (ISRS) de primera línea para depresión y ansiedad.
- El abandono de antidepresivos sin supervisión médica puede producir síndrome de discontinuación y rebote del episodio depresivo.
- Tratamiento: psicoterapia (cognitivo-conductual es la más estudiada), antidepresivos, y en casos graves, tratamiento combinado.

3. ANSIEDAD Y TRASTORNOS DE ANSIEDAD
- Los trastornos de ansiedad son el grupo de trastornos mentales más frecuentes a nivel global.
- Incluyen: trastorno de ansiedad generalizada (TAG), trastorno de pánico, fobia social, TOC, TEPT.
- Síntomas físicos: taquicardia, dificultad para respirar, sudoración, tensión muscular, mareos.
- Síntomas psicológicos: preocupación excesiva, miedo anticipatorio, evitación, dificultad para dormir.
- Tratamiento: terapia cognitivo-conductual, técnicas de relajación y mindfulness, ISRS, benzodiazepinas (solo a corto plazo bajo supervisión médica).

4. TRASTORNO BIPOLAR
- Se caracteriza por episodios alternados de manía (euforia, grandiosidad, disminución del sueño, impulsividad) y depresión.
- Afecta aproximadamente al 1-2% de la población.
- Tratamiento: estabilizadores del estado de ánimo (litio, valproato), antipsicóticos, psicoeducación.

5. TRASTORNO DE ESTRÉS POSTRAUMÁTICO (TEPT)
- Surge tras la exposición a eventos traumáticos (violencia, accidentes, desastres).
- Síntomas: reviviscencias (flashbacks), pesadillas, hipervigilancia, evitación.
- Tratamiento: EMDR, terapia cognitivo-conductual focalizada en trauma.

6. PSICOSIS (EPISODIO PSICÓTICO)
- Estado en el que la persona pierde contacto con la realidad: alucinaciones, delirios, pensamiento desorganizado.
- Puede ser síntoma de esquizofrenia, trastorno bipolar, depresión grave, consumo de sustancias, o causas orgánicas.
- Es una urgencia médica: requiere evaluación psiquiátrica inmediata.
- El delirio psicótico puede hacer que la persona actúe de formas que normalmente no lo haría, incluida la violencia (aunque esto es estadísticamente raro; la mayoría de las personas con psicosis no son violentas y son más frecuentemente víctimas).

SÍNDROME DE AMOK:
- Reconocido por la OMS como síndrome cultural: "episodio aleatorio, aparentemente no provocado, de un comportamiento asesino o destructor de los demás, seguido de amnesia o agotamiento".
- El término proviene del malayo "meng-amok" (atacar con ira ciega). Clasificado inicialmente en el sudeste asiático, hoy se reconoce en todo el mundo.
- Se diferencia del brote psicótico esquizofrénico con conducta violenta. Generalmente va precedido de un período de preocupación, pesadumbre y depresión moderada.
- Implicancias forenses: plantea preguntas complejas sobre imputabilidad. No debe usarse como etiqueta sensacionalista.

HOMICIDIO ALTRUISTA / FILICIDIO ALTRUISTA:
- En el contexto de psicosis grave (especialmente depresión psicótica o esquizofrenia), algunas personas matan a sus seres queridos bajo la creencia delirante de que los están protegiendo de un mal mayor.
- La persona no actúa por maldad sino por una percepción completamente distorsionada de la realidad.
- Este concepto no justifica ni minimiza los hechos: describe un fenómeno clínico reconocido por la psiquiatría forense.

ABANDONO DE MEDICACIÓN PSIQUIÁTRICA:
- Es el principal factor de riesgo de recaída en trastornos psicóticos y del ánimo.
- La interrupción abrupta de antipsicóticos puede producir psicosis de rebote, más grave que la inicial.
- Factores que llevan al abandono: efectos secundarios, falta de insight (la persona no cree estar enferma), costos, barreras de acceso, falta de apoyo familiar o profesional.
- Si alguien en tu entorno está dejando la medicación psiquiátrica sin indicación médica, es urgente consultar con su psiquiatra.

ESTIGMA Y SALUD MENTAL
══════════════════════════════════════════
- El estigma es una de las principales barreras para buscar ayuda: el 77% de las personas con trastornos mentales en Latinoamérica no recibe tratamiento, en parte por vergüenza o discriminación.
- Las personas con trastornos mentales NO son más peligrosas que la población general —al contrario, son más frecuentemente víctimas de violencia.
- El caso Leguizamón no debe usarse para estigmatizar a personas con esquizofrenia. Se trata de un caso excepcional en el contexto de un estado psicótico grave y abandono de tratamiento.
- Las personas con esquizofrenia bajo tratamiento llevan vidas plenas y funcionales.

// ─── CHIPS ────────────────────────────────────────────────────────────────────

const QUICK_CHIPS = [
  '¿Qué pasó en Villa Crespo?',
  '¿Qué es la esquizofrenia?',
  '¿Qué es el síndrome de Amok?',
  'Señales de alerta en alguien cercano',
  'Centros gratuitos en CABA',
  'Líneas de crisis y emergencias',
  'Violencia de género',
  '¿Qué hace el abandono de medicación?',
  'Cómo sacar turno gratis',
  'Ayuda para familias en duelo',
];

// ─── CONVERSACIÓN ─────────────────────────────────────────────────────────────

const history = []; // {role, content}

// ─── UI ──────────────────────────────────────────────────────────────────────

const msgContainer = document.getElementById('messages');
const chipsContainer = document.getElementById('chips');
const chipsWrap = document.getElementById('chips-wrap');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

function addMsg(html, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  div.appendChild(bubble);
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.innerHTML = `<div class="bubble"><span></span><span></span><span></span></div>`;
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;
  return div;
}

function renderChips() {
  chipsContainer.innerHTML = '';
  chipsWrap.style.display = '';
  QUICK_CHIPS.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = label;
    btn.onclick = () => dispatchMessage(label);
    chipsContainer.appendChild(btn);
  });
}

function hideChips() {
  chipsWrap.style.display = 'none';
}

function setLoading(on) {
  sendBtn.disabled = on;
  inputEl.disabled = on;
}

// ─── API CALL ─────────────────────────────────────────────────────────────────

async function callClaude(userText) {
  history.push({ role: 'user', content: userText });

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: history,
    })
  });

  if (!response.ok) {
    throw new Error(`API error ${response.status}`);
  }

  const data = await response.json();
  const reply = data.content?.find(b => b.type === 'text')?.text || 'No pude generar una respuesta. Por favor, intentá de nuevo.';
  history.push({ role: 'assistant', content: reply });
  return reply;
}

// ─── ENVIAR ───────────────────────────────────────────────────────────────────

async function dispatchMessage(text) {
  if (!text?.trim()) return;
  hideChips();
  addMsg(text, 'user');
  setLoading(true);
  const typing = addTyping();

  try {
    const reply = await callClaude(text);
    typing.remove();
    // Convert plain text newlines to <br> but preserve HTML
    addMsg(reply.replace(/\n/g, '<br>'), 'bot');
  } catch (err) {
    typing.remove();
    addMsg(`<strong>Hubo un problema de conexión.</strong> Si necesitás ayuda urgente, llamá al <a href="tel:135">135</a> (CAS, CABA) o al <a href="tel:08003331665">0800-333-1665</a>.`, 'bot');
    console.error(err);
  } finally {
    setLoading(false);
    setTimeout(renderChips, 500);
  }
}

function sendMsg() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  dispatchMessage(text);
}

// ─── INICIO ──────────────────────────────────────────────────────────────────

window.onload = () => {
  setTimeout(() => {
    addMsg(`Hola. Soy el asistente de acompañamiento de <strong>Tinta Roja</strong>.<br><br>
Estoy aquí para ayudarte con información sobre <strong>salud mental</strong>, el <strong>caso de Villa Crespo</strong> y recursos de atención gratuita en CABA y el Gran Buenos Aires.<br><br>
Podés escribirme lo que necesitás o elegir uno de los temas de abajo. Todo lo que hablemos es confidencial.`, 'bot');
    setTimeout(renderChips, 400);
  }, 300);
};
</script>
