<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente — Recursos de Salud Mental</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #F7F4EF;
    --surface:   #FFFFFF;
    --border:    #E0DAD0;
    --ink:       #1A1714;
    --muted:     #7A7068;
    --accent:    #8B3A3A;
    --accent-lt: #F2E8E8;
    --bot-bg:    #FFFFFF;
    --user-bg:   #8B3A3A;
    --user-txt:  #FFFFFF;
    --chip-bg:   #EFEBE4;
    --chip-hover:#DDD5C8;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 520px;
    margin: 0 auto;
    background: var(--bg);
  }

  /* HEADER */
  .header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .dot {
    width: 9px; height: 9px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  .header p {
    font-size: 11.5px;
    color: var(--muted);
    line-height: 1.5;
    padding-left: 19px;
  }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 88%;
    animation: fadeUp 0.22s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.bot  { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    line-height: 1.55;
    font-size: 13.5px;
  }
  .bot  .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--ink);
  }
  .user .bubble {
    background: var(--user-bg);
    color: var(--user-txt);
    border-bottom-right-radius: 4px;
  }

  .bubble strong { font-weight: 500; color: var(--accent); }
  .bubble a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .user .bubble strong { color: #FFD0D0; }
  .user .bubble a { color: #FFD0D0; }

  .bubble ul { padding-left: 16px; margin-top: 6px; }
  .bubble li { margin-bottom: 5px; }

  .tag {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 4px;
  }
  .msg.user .tag { text-align: right; }

  /* CHIPS */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 16px 8px;
    flex-shrink: 0;
  }
  .chip {
    background: var(--chip-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: 'DM Sans', sans-serif;
    line-height: 1;
  }
  .chip:hover  { background: var(--chip-hover); transform: translateY(-1px); }
  .chip:active { transform: translateY(0); }

  /* INPUT */
  .input-bar {
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .input-bar textarea {
    flex: 1;
    padding: 9px 13px;
    border: 1px solid var(--border);
    border-radius: 22px;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--ink);
    resize: none;
    outline: none;
    line-height: 1.45;
    max-height: 100px;
    transition: border-color 0.15s;
    rows: 1;
  }
  .input-bar textarea:focus { border-color: var(--accent); }
  .input-bar textarea::placeholder { color: var(--muted); }
  .send-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn svg { fill: white; width: 16px; height: 16px; }

  .crisis-bar {
    background: var(--accent-lt);
    border-top: 1px solid #D9BFBF;
    padding: 7px 16px;
    font-size: 11px;
    color: var(--accent);
    text-align: center;
    flex-shrink: 0;
  }
  .crisis-bar a { color: var(--accent); font-weight: 500; }

  /* Typing indicator */
  .typing .bubble {
    display: flex; gap: 4px; align-items: center;
    padding: 12px 16px;
  }
  .typing .bubble span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }
  .typing .bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing .bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(1); }
    40%            { opacity: 1;   transform: scale(1.2); }
  }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="header-top">
      <div class="dot"></div>
      <h1>Asistente de recursos — Salud Mental</h1>
    </div>
    <p>Información sobre el caso de Villa Crespo y centros de atención en GBA/CABA.</p>
  </div>

  <div class="messages" id="messages"></div>

  <div class="chips" id="chips"></div>

  <div class="crisis-bar">
    ¿Estás en crisis? Llamá ahora: <a href="tel:135">135</a> (CABA) · <a href="tel:0800-333-1665">0800-333-1665</a> (GBA, gratuito)
  </div>

  <div class="input-bar">
    <textarea id="input" placeholder="Escribí tu consulta..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="send-btn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
// ─── BASE DE CONOCIMIENTO ───────────────────────────────────────────────────

const KB = {
  saludo: {
    patterns: ['hola','buenas','buen dia','buenas tardes','buenas noches','hello','hey'],
    response: `Hola. Estoy aquí para ayudarte a encontrar <strong>información y recursos</strong> relacionados con el caso de la masacre de Villa Crespo y la situación de Laura Leguizamón, así como centros de salud mental en CABA y GBA.\n\n¿Qué necesitás saber?`
  },
  caso: {
    patterns: ['caso','leguizamon','leguizamón','villa crespo','masacre','que paso','qué pasó','de que trata','de qué trata'],
    response: `El caso de la <strong>masacre de Villa Crespo</strong> involucra a Laura Leguizamón y pone en foco la violencia de género extrema y la falla institucional en la protección de víctimas.\n\nEste espacio busca acompañar a quienes se ven afectados emocionalmente por el caso con <strong>información sobre recursos de salud mental</strong> accesibles.\n\n¿Querés saber sobre centros de atención, líneas de crisis, o recursos para familias?`
  },
  crisis: {
    patterns: ['crisis','urgencia','urgente','no puedo mas','no puedo más','me quiero morir','suicid','ayuda ya','estoy mal','muy mal'],
    response: `Entiendo que estás pasando por un momento muy difícil. Por favor, <strong>no estés solo/a</strong>.\n\nComunicate ahora:\n<ul><li><strong>Centro de Asistencia al Suicida:</strong> <a href="tel:135">135</a> (CABA, 24hs, gratuito)</li><li><strong>SAME:</strong> <a href="tel:107">107</a></li><li><strong>GBA:</strong> <a href="tel:08003331665">0800-333-1665</a> (gratuito)</li><li><strong>WhatsApp:</strong> +54 9 11 5275-1135 (CAS)</li></ul>\nEstas líneas son gratuitas y confidenciales.`
  },
  caba: {
    patterns: ['caba','capital','buenos aires ciudad','ciudad','centro','salud mental caba'],
    response: `Centros de <strong>Salud Mental en CABA</strong> (gratuitos):\n<ul><li><strong>CeSAC</strong> (Centros de Salud): atención psicológica gratuita en todos los barrios. Buscá el más cercano en <a href="https://buenosaires.gob.ar/salud/cesac" target="_blank">buenosaires.gob.ar/salud/cesac</a></li><li><strong>Hospital Borda</strong> – Ramón Carrillo 375 · Tel: 4305-8901</li><li><strong>Hospital Alvear</strong> – Warnes 2650 · Tel: 4581-1200</li><li><strong>Hospital Tobar García</strong> (infancia y adolescencia) – Ramón Carrillo 315 · Tel: 4305-9642</li><li><strong>CEPRAM</strong> – Asistencia a víctimas de violencia: 0800-666-8537</li></ul>`
  },
  gba: {
    patterns: ['gba','gran buenos aires','provincia','conurbano','bonaerense','zona norte','zona sur','zona oeste','lanus','lomas','quilmes','moron','tigre','san isidro'],
    response: `Centros de <strong>Salud Mental en GBA</strong> (gratuitos):\n<ul><li><strong>Hospital Zubizarreta</strong> (zona sur) – Av. Pedro Morán 2999, Flores</li><li><strong>Hospital Muñiz</strong> – Uspallata 2272, CABA (atiende GBA)</li><li><strong>Hospital El Cruce</strong> (Quilmes/Florencio Varela) – Tel: 4210-9000</li><li><strong>CAPS municipales</strong>: cada municipio tiene Centros de Atención Primaria con psicólogos. Buscá el de tu zona en el sitio de tu municipio.</li><li><strong>Línea de orientación provincial:</strong> <a href="tel:08003331665">0800-333-1665</a> (gratuita, 24hs)</li></ul>`
  },
  violencia: {
    patterns: ['violencia','violencia de genero','violencia género','femicidio','abuso','maltrato','víctima','victima'],
    response: `Recursos especializados en <strong>violencia de género</strong>:\n<ul><li><strong>Línea 144</strong> – Atención, contención y asesoramiento: <a href="tel:144">144</a> (24hs, gratuita, todo el país)</li><li><strong>Comisarías de la Mujer</strong> – CABA y GBA: podés hacer la denuncia directamente</li><li><strong>OFAVyT</strong> – Oficina de Asistencia a Víctimas: Lavalle 1220, CABA · Tel: 0800-333-5589</li><li><strong>Patrocinio jurídico gratuito</strong> – UBA: Av. Figueroa Alcorta 2263 · Tel: 4809-5645</li></ul>`
  },
  familias: {
    patterns: ['familia','familiar','hermano','hermana','hijo','hija','madre','padre','duelo','perdida','pérdida','apoyo'],
    response: `Para <strong>familias afectadas</strong> por situaciones de violencia extrema:\n<ul><li><strong>Centro de Asistencia a la Víctima</strong> – Min. Justicia CABA: 0800-333-5589</li><li><strong>Programa de Acompañamiento al Duelo</strong> – Hospital Durand: Av. Díaz Vélez 5044 · Tel: 4982-5555</li><li><strong>Grupos de apoyo</strong> – Asociación Madres del Dolor: <a href="https://madresdeldolor.org.ar" target="_blank">madresdeldolor.org.ar</a></li><li><strong>Asistencia psicológica gratuita</strong> en todos los hospitales públicos de CABA, sin turno en urgencias.</li></ul>`
  },
  gratuito: {
    patterns: ['gratis','gratuito','sin dinero','no tengo plata','no puedo pagar','sin obra social','sin cobertura'],
    response: `Toda la atención en <strong>hospitales públicos es gratuita</strong>, no necesitás obra social.\n\nOpciones sin costo:\n<ul><li><strong>Hospitales públicos</strong> de CABA y GBA: pedí turno o presentate en urgencias</li><li><strong>CeSAC</strong> (CABA): atención psicológica gratuita por barrio</li><li><strong>UBA Psicología</strong> – Clínica gratuita con profesionales supervisados: Av. Independencia 3065 · Tel: 5287-5600</li><li><strong>Línea 135 y 144</strong>: orientación y derivación gratuita las 24hs</li></ul>`
  },
  turno: {
    patterns: ['turno','como saco','cómo saco','sacar turno','pedir turno','donde ir','dónde ir'],
    response: `Para <strong>sacar turno</strong> en CABA:\n<ul><li><strong>Online:</strong> <a href="https://turnosweb.buenosaires.gob.ar" target="_blank">turnosweb.buenosaires.gob.ar</a></li><li><strong>Teléfono:</strong> 147 (atención ciudadana CABA)</li><li><strong>Presencial:</strong> acercate al hospital o CeSAC más cercano</li></ul>\nEn <strong>GBA</strong>: ingresá al sitio de tu municipio o llamá al centro de salud de tu barrio.\n\n<strong>Si es urgente</strong>, no necesitás turno: podés ir directo a urgencias de cualquier hospital público.`
  },
  default: {
    response: `No tengo información específica sobre eso, pero puedo ayudarte con:\n<ul><li>Centros de salud mental en CABA o GBA</li><li>Líneas de crisis y emergencias</li><li>Recursos para víctimas de violencia</li><li>Información sobre el caso de Villa Crespo</li><li>Cómo sacar turno gratis</li></ul>\n¿Sobre cuál de estos temas necesitás info?`
  }
};

const QUICK_CHIPS = [
  { label: '¿Qué fue la masacre de Villa Crespo?', key: 'caso' },
  { label: 'Centros en CABA', key: 'caba' },
  { label: 'Centros en GBA', key: 'gba' },
  { label: 'Líneas de crisis', key: 'crisis' },
  { label: 'Violencia de género', key: 'violencia' },
  { label: 'Ayuda para familias', key: 'familias' },
  { label: 'Atención gratuita', key: 'gratuito' },
  { label: 'Cómo sacar turno', key: 'turno' },
];

// ─── LÓGICA ─────────────────────────────────────────────────────────────────

function matchResponse(text) {
  const t = text.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,' ');

  for (const [key, entry] of Object.entries(KB)) {
    if (key === 'default') continue;
    if (entry.patterns && entry.patterns.some(p => t.includes(p))) {
      return entry.response;
    }
  }
  return KB.default.response;
}

// ─── UI ──────────────────────────────────────────────────────────────────────

const msgContainer = document.getElementById('messages');
const chipsContainer = document.getElementById('chips');
const input = document.getElementById('input');

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');
  div.appendChild(bubble);
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.innerHTML = `<div class="bubble"><span></span><span></span><span></span></div>`;
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;
  return div;
}

function renderChips() {
  chipsContainer.innerHTML = '';
  QUICK_CHIPS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = c.label;
    btn.onclick = () => {
      addMsg(c.label, 'user');
      chipsContainer.innerHTML = '';
      const typing = addTyping();
      setTimeout(() => {
        typing.remove();
        const resp = KB[c.key]?.response || KB.default.response;
        addMsg(resp, 'bot');
        setTimeout(renderChips, 400);
      }, 600);
    };
    chipsContainer.appendChild(btn);
  });
}

function sendMsg() {
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  chipsContainer.innerHTML = '';
  const typing = addTyping();
  setTimeout(() => {
    typing.remove();
    addMsg(matchResponse(text), 'bot');
    setTimeout(renderChips, 400);
  }, 700);
}

// ─── INICIO ──────────────────────────────────────────────────────────────────

window.onload = () => {
  setTimeout(() => {
    addMsg(`Hola. Soy un asistente con información sobre el <strong>caso de la masacre de Villa Crespo</strong> y recursos de <strong>salud mental gratuitos</strong> en CABA y el Gran Buenos Aires.\n\nPodés escribirme o elegir una opción de abajo.`, 'bot');
    setTimeout(renderChips, 400);
  }, 300);
};
</script>
</body>
</html>
