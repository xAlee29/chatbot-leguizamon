<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Asistente — Recursos de Salud Mental</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F4EF; --surface: #FFFFFF; --border: #E0DAD0;
    --ink: #1A1714; --muted: #7A7068; --accent: #8B3A3A;
    --accent-lt: #F2E8E8; --bot-bg: #FFFFFF; --user-bg: #8B3A3A;
    --user-txt: #FFFFFF; --chip-bg: #EFEBE4; --chip-hover: #DDD5C8;
  }
  html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); }
  .shell { display: flex; flex-direction: column; height: 100vh; max-width: 520px; margin: 0 auto; background: var(--bg); }
  .header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
  .dot { width: 9px; height: 9px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: 15px; font-weight: 400; color: var(--ink); }
  .header p { font-size: 11px; color: var(--muted); line-height: 1.5; padding-left: 19px; }
  .fuentes { font-size: 10px; color: var(--muted); padding-left: 19px; margin-top: 2px; font-style: italic; }
  .messages { flex: 1; overflow-y: auto; padding: 18px 14px 10px; display: flex; flex-direction: column; gap: 11px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .msg { display: flex; flex-direction: column; max-width: 90%; animation: fadeUp 0.22s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
  .bubble { padding: 10px 14px; border-radius: 16px; line-height: 1.55; font-size: 13px; }
  .bot .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--ink); }
  .user .bubble { background: var(--user-bg); color: var(--user-txt); border-bottom-right-radius: 4px; }
  .bubble strong { font-weight: 500; color: var(--accent); }
  .bubble a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
  .user .bubble strong { color: #FFD0D0; }
  .user .bubble a { color: #FFD0D0; }
  .bubble ul { padding-left: 16px; margin-top: 5px; }
  .bubble li { margin-bottom: 5px; line-height: 1.5; }
  .bubble .nota { font-size: 11px; color: var(--muted); margin-top: 8px; border-top: 1px solid var(--border); padding-top: 6px; font-style: italic; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; padding: 4px 14px 6px; flex-shrink: 0; }
  .chip { background: var(--chip-bg); border: 1px solid var(--border); border-radius: 20px; padding: 5px 11px; font-size: 11.5px; color: var(--ink); cursor: pointer; transition: background 0.15s, transform 0.1s; font-family: 'DM Sans', sans-serif; line-height: 1; }
  .chip:hover { background: var(--chip-hover); transform: translateY(-1px); }
  .chip:active { transform: translateY(0); }
  .crisis-bar { background: var(--accent-lt); border-top: 1px solid #D9BFBF; padding: 6px 14px; font-size: 11px; color: var(--accent); text-align: center; flex-shrink: 0; }
  .crisis-bar a { color: var(--accent); font-weight: 500; }
  .input-bar { padding: 8px 14px 12px; border-top: 1px solid var(--border); background: var(--bg); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
  .input-bar textarea { flex: 1; padding: 9px 13px; border: 1px solid var(--border); border-radius: 22px; background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); resize: none; outline: none; line-height: 1.45; max-height: 100px; transition: border-color 0.15s; }
  .input-bar textarea:focus { border-color: var(--accent); }
  .input-bar textarea::placeholder { color: var(--muted); }
  .send-btn { width: 37px; height: 37px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn svg { fill: white; width: 15px; height: 15px; }
  .typing .bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
  .typing .bubble span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: blink 1.2s infinite; }
  .typing .bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing .bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; transform: scale(1); } 40% { opacity: 1; transform: scale(1.2); } }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-top"><div class="dot"></div><h1>Asistente — Salud Mental y Caso Villa Crespo</h1></div>

<script>
const KB = [

  // ── CASO ──────────────────────────────────────────────────────────
  {
    id: 'caso_que_paso',
    patterns: ['caso','leguizamon','leguizamón','villa crespo','masacre','que paso','qué pasó','que ocurrio','que ocurrió','familia','seltzer','aguirre'],
    response: `El <strong>21 de mayo de 2025</strong>, la empleada doméstica de la familia encontró cuatro cuerpos en un departamento del sexto piso de la calle Aguirre al 295, en Villa Crespo (CABA).\n\nLas víctimas fueron <strong>Bernardo Adrián Seltzer</strong> (53 años), sus hijos <strong>Ian</strong> (15) e <strong>Ivo</strong> (12), y su esposa <strong>Laura Leguizamón</strong> (50), quien falleció en el baño con heridas autoinfligidas.\n\nLas pericias forenses y una <strong>carta manuscrita</strong> encontrada en la mesa de cocina apuntaron a que fue Laura quien atacó a su familia antes del amanecer y luego se quitó la vida.\n\n¿Querés saber más sobre la investigación, el papel de la salud mental en el caso, o los temas vinculados?`
  },
  {
    id: 'caso_investigacion',
    patterns: ['investigacion','investigación','pericia','prueba','policia','policía','judicial','como se supo','cómo se supo','carta','cuchillo'],
    response: `<strong>Claves de la investigación:</strong>\n<ul><li>Las heridas de Laura eran autoinfligidas: múltiples, directas al corazón, sin lesiones defensivas en espalda.</li><li>Las huellas dactilares en los cuchillos eran de su mano izquierda, sin más huellas que las de ella.</li><li>El rigor cadavérico indicó que ella murió al menos una hora y media después que su familia, tiempo suficiente para escribir la carta.</li><li>Se encontró medicación psiquiátrica en el departamento y se tomó declaración al psiquiatra que la atendía.</li><li>El psiquiatra confirmó que estaba bajo tratamiento por una <strong>patología psiquiátrica grave</strong> que combinaba depresión y esquizofrenia.</li></ul>\n<span class="nota">Fuente: Infobae, La Nación, ViaPaís — mayo/junio 2025</span>`
  },
  {
    id: 'caso_salud_mental',
    patterns: ['brote','psicosis','psicótico','psicótica','por que lo hizo','por qué lo hizo','homicidio altruista','suicidio ampliado','motivo','razon','razón'],
    response: `El psiquiatra forense Andrés Mega (ex perito de la Corte Suprema) analizó el caso y señaló que podría tratarse de un <strong>homicidio altruista o suicidio ampliado</strong>: un fenómeno poco frecuente pero documentado mundialmente, asociado a trastornos psicóticos graves.\n\n<strong>¿Qué es el suicidio ampliado?</strong> Es cuando una persona en estado delirante cree, de manera distorsionada, que está "protegiendo" a sus seres queridos al quitarles la vida antes de suicidarse. No es un acto racional ni planificado en el sentido criminal convencional.\n\nEl experto remarcó que <strong>"los pacientes psiquiátricos no son violentos en más del 90% de los casos. Este tipo de hechos son excepcionales y profundamente trágicos"</strong>.\n\nLa justicia indagó también si hubo fallas en el seguimiento del tratamiento e internación.\n<span class="nota">Fuente: Border Periodismo / Aire de Santa Fe, mayo 2025</span>`
  },
  {
    id: 'caso_familia',
    patterns: ['familia leguizamon','hermana','carina','padres','familiar','france','desde francia'],
    response: `Carina Leguizamón, hermana de Laura que reside en Francia, habló públicamente sobre el caso. Señaló que la familia de Laura —sus padres desde Lanús— llegó al lugar apenas se enteraron, sin poder obtener información concreta de las autoridades.\n\nEl caso puso en foco la pregunta de qué señales previas existieron y si el sistema de salud mental tuvo la capacidad de contener la situación antes de la tragedia.\n<span class="nota">Fuente: Derecha Diario, junio 2025</span>`
  },

  // ── TRASTORNOS MENTALES ─────────────────────────────────────────
  {
    id: 'depresion',
    patterns: ['depresion','depresión','triste','tristeza','sin ganas','no tengo energía','no tengo energia','lloro','llanto','melancolía','melancolia'],
    response: `<strong>Depresión</strong> (según OMS, 2024)\n\nEs uno de los trastornos más comunes: afectó a <strong>280 millones de personas</strong> en 2019 a nivel mundial.\n\n<strong>Síntomas principales:</strong>\n<ul><li>Estado de ánimo persistentemente bajo o vacío</li><li>Pérdida de interés o placer en actividades habituales</li><li>Cansancio y falta de energía</li><li>Dificultad para concentrarse o tomar decisiones</li><li>Cambios en el sueño y el apetito</li><li>Sentimientos de inutilidad o culpa excesiva</li><li>En casos graves: pensamientos de muerte o suicidio</li></ul>\n<strong>Tratamiento:</strong> La combinación de psicoterapia (especialmente cognitivo-conductual) y medicación antidepresiva es efectiva en la mayoría de los casos. La depresión <em>tiene tratamiento</em> y la recuperación es posible.\n<span class="nota">Fuente: OMS — Trastornos Mentales, 2024</span>`
  },
  {
    id: 'ansiedad',
    patterns: ['ansiedad','ansioso','ansiosa','angustia','panico','pánico','nervios','preocupación','preocupacion','fobia','toc','obsesivo'],
    response: `<strong>Trastornos de ansiedad</strong> (según OMS / MedlinePlus)\n\nSon los trastornos mentales más frecuentes. Incluyen:\n<ul><li><strong>Trastorno de ansiedad generalizada:</strong> preocupación excesiva y difícil de controlar sobre múltiples temas</li><li><strong>Trastorno de pánico:</strong> ataques de pánico repentinos con síntomas físicos intensos (palpitaciones, sudoración, miedo a morir)</li><li><strong>Ansiedad social:</strong> miedo intenso a situaciones sociales o de rendimiento</li><li><strong>TOC</strong> (trastorno obsesivo-compulsivo): pensamientos repetitivos e indeseados con rituales compulsivos</li></ul>\n<strong>Tratamiento:</strong> La psicoterapia cognitivo-conductual es el tratamiento más respaldado por la evidencia. En muchos casos se combina con medicación ansiolítica o antidepresiva.\n<span class="nota">Fuente: OMS · MedlinePlus en Español</span>`
  },
  {
    id: 'esquizofrenia',
    patterns: ['esquizofrenia','psicosis','psicótico','psicótica','alucinacion','alucinación','delirio','voces','brote psicotico','brote psicótico','desorganizado'],
    response: `<strong>Esquizofrenia y Psicosis</strong> (según OMS / OPS)\n\nLa esquizofrenia es un trastorno mental grave que afecta el modo en que una persona piensa, siente y percibe la realidad.\n\n<strong>Síntomas principales:</strong>\n<ul><li><strong>Positivos:</strong> alucinaciones (escuchar o ver cosas que otros no perciben), delirios (creencias que no se corresponden con la realidad), pensamiento desorganizado</li><li><strong>Negativos:</strong> aplanamiento emocional, aislamiento social, falta de motivación</li><li><strong>Cognitivos:</strong> dificultades de concentración y memoria</li></ul>\n<strong>Importante:</strong> Las personas con esquizofrenia <em>no son peligrosas en la gran mayoría de los casos</em>. Son más propensas a ser víctimas de violencia que a ejercerla.\n\n<strong>Tratamiento:</strong> Antipsicóticos + psicoterapia + apoyo familiar y comunitario. Con tratamiento adecuado, muchas personas llevan vidas plenas.\n<span class="nota">Fuente: OMS · OPS — Tratamiento farmacológico de trastornos mentales</span>`
  },
  {
    id: 'bipolar',
    patterns: ['bipolar','trastorno bipolar','mania','manía','hipomanía','hipomania','cambios de humor','cambios humor','euforico','eufórico'],
    response: `<strong>Trastorno Bipolar</strong> (según OMS, 2024)\n\nAfecta al <strong>0,5% de la población mundial</strong> (unos 37 millones de personas). Se caracteriza por episodios alternantes de:\n<ul><li><strong>Manía/hipomanía:</strong> energía exaltada, poco sueño, grandiosidad, impulsividad, pensamiento acelerado</li><li><strong>Depresión:</strong> tristeza profunda, falta de energía, desesperanza</li><li><strong>Episodios mixtos:</strong> síntomas de ambos simultáneamente</li></ul>\n<strong>Diagnóstico:</strong> Puede confundirse con depresión o esquizofrenia. Es clave consultar a un psiquiatra.\n\n<strong>Tratamiento:</strong> Estabilizadores del estado de ánimo (litio, valproato), antipsicóticos en algunos casos, y psicoterapia. El diagnóstico temprano mejora significativamente el pronóstico.\n<span class="nota">Fuente: OMS — Trastorno Bipolar · NIMH en Español</span>`
  },
  {
    id: 'estrés_postraumático',
    patterns: ['trauma','estrés postraumático','estres postraumatico','ptsd','tept','pesadilla','flashback','violencia sufrida','abuso sufrido'],
    response: `<strong>Trastorno de Estrés Postraumático (TEPT)</strong>\n\nSe puede desarrollar tras vivir o presenciar eventos traumáticos (violencia, accidentes, pérdidas traumáticas, abuso).\n\n<strong>Síntomas:</strong>\n<ul><li>Recuerdos intrusivos o flashbacks del evento</li><li>Pesadillas recurrentes</li><li>Evitación de lugares, personas o pensamientos vinculados al trauma</li><li>Hipervigilancia y sobresaltos exagerados</li><li>Dificultad para sentir emociones positivas</li></ul>\n<strong>Tratamiento:</strong> La terapia cognitivo-conductual centrada en el trauma (TCC-T), el EMDR y otros enfoques específicos son los más respaldados por la evidencia internacional.\n<span class="nota">Fuente: OMS · OPS — Guía mhGAP</span>`
  },
  {
    id: 'duelo',
    patterns: ['duelo','perdi','perdí','murio','murió','fallecio','falleció','muerto','muerte familiar','muerte de','extraño','extraño a'],
    response: `<strong>Duelo</strong>\n\nEl duelo es una respuesta natural y necesaria ante la pérdida de alguien querido. No es una enfermedad, pero puede convertirse en un <strong>duelo complicado</strong> que requiere apoyo profesional cuando:\n<ul><li>La intensidad del dolor no disminuye luego de varios meses</li><li>Impide el funcionamiento cotidiano (trabajo, alimentación, vínculos)</li><li>Aparecen pensamientos de no querer seguir viviendo</li><li>Hay consumo de alcohol u otras sustancias para "aliviar" el dolor</li></ul>\n<strong>¿Qué ayuda?</strong> No estar solo/a. Grupos de apoyo, psicoterapia y —en casos graves— tratamiento psiquiátrico. Buscar ayuda no es debilidad: es cuidarse.\n\nSi perdiste a alguien de manera traumática, podés acceder a atención gratuita en cualquier hospital público de CABA o GBA.`
  },
  {
    id: 'estigma',
    patterns: ['estigma','discriminacion','discriminación','loco','loca','peligroso','peligrosa','temer','miedo a los pacientes','pacientes mentales son violentos'],
    response: `<strong>El estigma en salud mental</strong>\n\nEl estigma es una de las mayores barreras para que las personas busquen ayuda. Algunos datos clave (OMS / OPS):\n<ul><li><strong>Más del 77,9% de las personas</strong> con trastornos mentales en América Latina no reciben atención.</li><li>Las personas con trastornos mentales son <em>más propensas a ser víctimas</em> de violencia que a ejercerla.</li><li>La mayoría lleva vidas plenas con tratamiento adecuado.</li><li>Los trastornos mentales no son causados por "falta de carácter" ni debilidad.</li></ul>\n<strong>El caso de Villa Crespo</strong> generó mucha desinformación al respecto. Los expertos insistieron: los episodios como el de Leguizamón son excepcionales y no deben usarse para generalizar sobre las personas con padecimientos psiquiátricos.\n<span class="nota">Fuente: OPS — Salud Mental en las Américas 2025</span>`
  },

  // ── LEY Y DERECHOS ──────────────────────────────────────────────
  {
    id: 'ley_salud_mental',
    patterns: ['ley','26657','ley de salud mental','derechos','mis derechos','derecho como paciente','marco legal'],
    response: `<strong>Ley Nacional de Salud Mental N° 26.657</strong>\n\nPromulgada en 2010 y reglamentada en 2013, es la ley marco que protege los derechos de todas las personas con padecimientos mentales. Está alineada con los principios de la ONU y la OPS.\n\n<strong>Derechos que te garantiza:</strong>\n<ul><li>Atención en el hospital o centro de salud más cercano a tu domicilio</li><li>Ser tratado/a con respeto, sin discriminación por tu diagnóstico</li><li>Recibir información clara sobre tu diagnóstico y tratamiento (consentimiento informado)</li><li>No ser internado/a salvo como último recurso terapéutico y por el menor tiempo posible</li><li>Que la internación sea en hospitales generales, no manicomios</li><li>Que no se prolongue la internación por razones sociales o de vivienda</li><li>Acceder a un equipo interdisciplinario (psicólogo, psiquiatra, trabajador social)</li></ul>\n<span class="nota">Fuente: Ley 26.657 — Infoleg · Argentina.gob.ar · Defensoría de CABA</span>`
  },
  {
    id: 'internacion',
    patterns: ['internacion','internación','internar','me quieren internar','internar a alguien','como internar','hospitalizacion','hospitalización'],
    response: `<strong>Internación en salud mental</strong> (Ley 26.657)\n\nSegún la ley argentina:\n<ul><li>La internación debe ser el <strong>último recurso terapéutico</strong>, cuando no hay alternativa ambulatoria posible.</li><li>Debe ser lo más <strong>breve posible</strong> según criterio clínico.</li><li>Requiere la evaluación de al menos <strong>dos profesionales</strong>, uno de los cuales debe ser psicólogo o psiquiatra.</li><li>Debe notificarse al juez dentro de las <strong>48 horas</strong>.</li><li>Se realiza en <strong>hospitales generales</strong>, no en manicomios.</li><li>Puede ser voluntaria o involuntaria (si hay riesgo cierto e inminente para sí mismo o terceros).</li></ul>\nSi necesitás internar a alguien de urgencia, podés llamar al <strong>SAME (107)</strong> o ir al Hospital más cercano.`
  },

  },
  {
    id: 'gba',
    patterns: ['gba','gran buenos aires','provincia','conurbano','zona norte','zona sur','zona oeste','lanus','lomas','quilmes','moron','tigre','san isidro','avellaneda','florencio varela','berazategui','esteban echeverria'],
    response: `<strong>Atención gratuita en GBA</strong>\n<ul><li><strong>CAPS municipales</strong>: cada municipio tiene Centros de Atención Primaria con psicólogos y psiquiatras. Consultá el sitio de tu municipio o preguntá en la salita más cercana.</li><li><strong>Hospital El Cruce</strong> (Florencio Varela/Quilmes) – Tel: 4210-9000</li><li><strong>Hospital Posadas</strong> (Morón) – Illia s/n, El Palomar · Tel: 4469-9000</li><li><strong>Hospital Fiorito</strong> (Lanús) – Belgrano 3100, Avellaneda · Tel: 4201-5777</li><li><strong>Hospital San Martín</strong> (La Plata) – Calle 1 y 70 · Tel: 0221-412-7777</li></ul>\n<strong>Línea provincial gratuita:</strong> <a href="tel:08003331665">0800-333-1665</a> (24hs) — orientación y derivación.`
  },
  {
    id: 'crisis',
    patterns: ['crisis','urgencia','urgente','no puedo mas','no puedo más','quiero morirme','me quiero morir','suicid','estoy muy mal','no aguanto','no aguanto más','no aguanto mas','ayuda urgente'],
    response: `Por favor, no estés solo/a. Comunicate ahora:\n<ul><li><strong>Centro de Asistencia al Suicida (CAS):</strong> <a href="tel:135">135</a> (CABA, 24hs, gratuito)</li><li><strong>SAME:</strong> <a href="tel:107">107</a></li><li><strong>GBA:</strong> <a href="tel:08003331665">0800-333-1665</a> (gratuito, 24hs)</li><li><strong>WhatsApp CAS:</strong> +54 9 11 5275-1135</li><li><strong>Línea 144</strong> (violencia de género, también escucha en crisis): <a href="tel:144">144</a></li></ul>\nEstas líneas son gratuitas y confidenciales. Las personas que atienden están capacitadas para ayudarte.`
  },

];

function normalize(t) {
  return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ');
}

const OPINION_PATTERNS = [
  'crees que','creés que','pensas que','pensás que','opinas','opinás','que piensas','qué pensás',
  'que opinas','qué opinás','estas de acuerdo','estás de acuerdo','es correcto','es incorrecto',
  'es bueno','es malo','deberia','debería','tendria que','tendría que','fue culpa','es culpable',
  'es inocente','merecia','merecía','tiene razon','tiene razón','quien tiene razon','quién tiene razón',
  'es mejor','es peor','es justo','es injusto','fue bien','fue mal','hizo bien','hizo mal',
  'fue correcto','fue incorrecto','fue bueno','fue malo','lo condenas','lo condenás',
  'la condenas','la condenás','te parece','a favor','en contra','defiendes','defendés',
  'criticas','criticás','juzgas','juzgás','como la ves','cómo la ves','que pensas del caso',
  'qué pensás del caso','que piensas del caso','cual es tu opinion','cuál es tu opinión',
  'tu postura','tu posicion','tu posición'
];

function isOpinionQuestion(t) {
  const n = normalize(t);
  return OPINION_PATTERNS.some(p => n.includes(normalize(p)));
}

const OPINION_RESPONSE = `Este asistente no emite opiniones ni juicios sobre personas, casos o situaciones.\n\nMi función es <strong>informar y orientar</strong>: acercar datos verificados sobre salud mental, recursos de atención y el contexto del caso de Villa Crespo, siempre basándome en fuentes como la OMS, la OPS y la Ley 26.657.\n\nSi tenés una pregunta informativa, con gusto te respondo. ¿Sobre qué tema necesitás información?`;

function matchResponse(text) {
  if (isOpinionQuestion(text)) return OPINION_RESPONSE;
  const t = normalize(text);
  let bestEntry = null, bestScore = 0;
  for (const entry of KB) {
    let score = 0;
    for (const p of entry.patterns) {
      if (t.includes(normalize(p))) score += p.length;
    }
    if (score > bestScore) { bestScore = score; bestEntry = entry; }
  }
  if (bestScore > 0) return bestEntry.response;
  return `No encontré información específica sobre eso. Podés preguntarme sobre:\n<ul><li>El caso de Villa Crespo y Laura Leguizamón</li><li>Trastornos mentales: depresión, ansiedad, esquizofrenia, bipolar</li><li>Tus derechos como paciente (Ley 26.657)</li><li>Centros de salud mental gratuitos en CABA o GBA</li><li>Líneas de crisis y prevención del suicidio</li><li>Recursos para víctimas de violencia y sus familias</li></ul>`;
}

const msgContainer = document.getElementById('messages');
const chipsContainer = document.getElementById('chips');
const input = document.getElementById('input');

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');
  div.appendChild(bubble);
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.innerHTML = `<div class="bubble"><span></span><span></span><span></span></div>`;
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;
  return div;
}

function renderChips() {
  chipsContainer.innerHTML = '';
  CHIPS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = c.label;
    btn.onclick = () => {
      addMsg(c.label, 'user');
      chipsContainer.innerHTML = '';
      const entry = KB.find(e => e.id === c.key);
      const typing = addTyping();
      setTimeout(() => {
        typing.remove();
        addMsg(entry ? entry.response : matchResponse(c.label), 'bot');
        setTimeout(renderChips, 300);
      }, 550);
    };
    chipsContainer.appendChild(btn);
  });
}

function sendMsg() {
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  chipsContainer.innerHTML = '';
  const typing = addTyping();
  setTimeout(() => {
    typing.remove();
    addMsg(matchResponse(text), 'bot');
    setTimeout(renderChips, 300);
  }, 650);
}

window.onload = () => {
  setTimeout(() => {
    addMsg(`Hola. Soy un asistente con información sobre el <strong>caso de la masacre de Villa Crespo</strong>, <strong>trastornos de salud mental</strong> y <strong>recursos de atención gratuita</strong> en CABA y GBA.\n\nToda la información está basada en fuentes de la <strong>OMS, OPS, Ley 26.657</strong> y organismos de salud de Argentina.\n\nPodés escribirme o elegir una opción abajo.`, 'bot');
    setTimeout(renderChips, 350);
  }, 250);
};
